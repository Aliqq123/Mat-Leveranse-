<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inloggning</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1d4ed8)}
.card{width:100%;max-width:380px;background:#fff;padding:32px;border-radius:20px;box-shadow:0 20px 50px rgba(0,0,0,.2)}
h1{text-align:center;margin-bottom:24px;color:#111827}
label{display:block;margin:14px 0 6px;color:#374151;font-size:14px}
input{width:100%;padding:12px 14px;border:1px solid #d1d5db;border-radius:10px;font-size:15px}
input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
button{width:100%;margin-top:20px;padding:12px;border:none;border-radius:10px;background:#2563eb;color:#fff;font-size:16px;font-weight:700;cursor:pointer}
button:hover{background:#1d4ed8}
.msg{margin-top:14px;text-align:center;font-size:14px;min-height:20px}
.small{text-align:center;margin-top:14px;font-size:14px;color:#6b7280}
a{color:#2563eb;text-decoration:none}
</style>
</head>
<body>
<div class="card">
<h1>Logga in</h1>
<form id="loginForm">
<label for="email">E-post</label>
<input id="email" type="email" placeholder="namn@epost.se" required />
<label for="password">Lösenord</label>
<input id="password" type="password" placeholder="••••••••" required />
<button type="submit">Logga in</button>
<div class="msg" id="msg"></div>
</form>
<div class="small">Har du inget konto? <a href="#">Registrera dig</a></div>
</div>
<script>
const form=document.getElementById('loginForm');
const msg=document.getElementById('msg');
form.addEventListener('submit',e=>{
 e.preventDefault();
 const email=document.getElementById('email').value.trim();
 const password=document.getElementById('password').value.trim();
 if(email==='admin@site.se' && password==='1234'){
   msg.textContent='Inloggning lyckades!';
   msg.style.color='green';
 } else {
   msg.textContent='Fel e-post eller lösenord.';
   msg.style.color='crimson';
 }
});
</script>
</body>
</html>
