<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kundvagn</title>
    <link rel="stylesheet" href="/FrontEnd/Cart/cart.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="/FrontEnd/Home/index.html">
          <img id="logo" src="../Images/foodie.png" alt="Foodie" />
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="/FrontEnd/Cart/cart.html">
                <img id="cartlogo" src="../Images/cart.png" alt="Cart" />
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/FrontEnd/admin/admin.html">
                <img id="adminlogo" src="../Images/admin.png" alt="Admin" />
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/FrontEnd/User/user.html">
                <img id="userlogo" src="../Images/user.png" alt="User" />
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <br />

    <div class="cart-container">
      <div class="cart-wrapper">
        <!-- Item 1 -->
        <div class="cart-item">
          <div class="item-main">
            <img
              src="/FrontEnd/Images/fatas.jpg"
              alt="food"
              class="item-image"
            />
            <div class="item-info">
              <h3>Burger</h3>
              <p>
                En saftig burgare med färska råvaror och vår speciella dressing.
                Perfekt för lunch eller middag.
              </p>
            </div>
          </div>
          <div class="item-controls">
            <img
              src="/FrontEnd/Images/trash.png"
              alt="trash"
              class="trash-btn"
            />
            <div class="quantity-control">
              <button class="quantity-btn">-</button>
              <input type="number" value="1" class="quantity-input" />
              <button class="quantity-btn">+</button>
            </div>
          </div>
        </div>

        <!-- Item 2 -->
        <div class="cart-item">
          <div class="item-main">
            <img
              src="/FrontEnd/Images/fatas.jpg"
              alt="food"
              class="item-image"
            />
            <div class="item-info">
              <h3>Burger Special</h3>
              <p>
                Vår lyxigaste variant med extra allt. Levereras med krispiga
                tillbehör.
              </p>
            </div>
          </div>
          <div class="item-controls">
            <img
              src="/FrontEnd/Images/trash.png"
              alt="trash"
              class="trash-btn"
            />
            <div class="quantity-control">
              <button class="quantity-btn">-</button>
              <input type="number" value="1" class="quantity-input" />
              <button class="quantity-btn">+</button>
            </div>
          </div>
        </div>
      </div>

      <div class="summary-section">
        <h1>Total: 67$</h1>
        <div class="checkout-actions">
          <button class="btn btn-cancel">Avbryt</button>
          <button class="btn btn-purchase">Gå till kassan</button>
        </div>
      </div>
    </div>
  </body>
</html>
